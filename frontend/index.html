<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --card: #1e293b; --border: #334155;
      --primary: #6366f1; --primary-h: #4f46e5;
      --danger: #ef4444; --success: #22c55e; --warn: #f59e0b;
      --text: #f1f5f9; --muted: #94a3b8; --input-bg: #0f172a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    .app { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }

    /* ── NAV ── */
    nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    nav h1 { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
    #nav-user { font-size: .85rem; color: var(--muted); }
    #btn-logout { display: none; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: .35rem .8rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
    #btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── CARDS ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.2rem; }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-size: .75rem; }

    /* ── TABS ── */
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .tab { padding: .5rem 1.2rem; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: .85rem; transition: all .15s; }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab:hover:not(.active) { border-color: var(--primary); color: var(--text); }

    /* ── FORMS ── */
    .form-group { margin-bottom: .9rem; }
    label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .3rem; }
    input, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: .6rem .8rem; color: var(--text); font-size: .9rem; outline: none; transition: border-color .15s; }
    input:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 70px; }

    /* ── BUTTONS ── */
    .btn { padding: .6rem 1.2rem; border-radius: 8px; border: none; cursor: pointer; font-size: .85rem; font-weight: 500; transition: all .15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-danger  { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: .3rem .7rem; font-size: .75rem; }
    .btn-danger:hover  { background: var(--danger); color: #fff; }
    .btn-success { background: transparent; border: 1px solid var(--success); color: var(--success); padding: .3rem .7rem; font-size: .75rem; }
    .btn-success:hover { background: var(--success); color: #fff; }
    .btn-sm { padding: .3rem .7rem; font-size: .75rem; }

    /* ── ALERT ── */
    .alert { padding: .6rem 1rem; border-radius: 8px; font-size: .82rem; margin-bottom: .9rem; display: none; }
    .alert.show { display: block; }
    .alert-error   { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .alert-success { background: #052e16; color: #86efac; border: 1px solid #14532d; }

    /* ── TASK LIST ── */
    .task-item { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .6rem; display: flex; align-items: flex-start; gap: .8rem; }
    .task-item.done { opacity: .6; }
    .task-item.done .task-title { text-decoration: line-through; }
    .task-content { flex: 1; min-width: 0; }
    .task-title { font-size: .92rem; font-weight: 500; color: var(--text); }
    .task-desc { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
    .task-meta { font-size: .7rem; color: var(--border); margin-top: .3rem; }
    .task-actions { display: flex; gap: .4rem; flex-shrink: 0; margin-top: .1rem; }
    .task-badge { font-size: .65rem; padding: .15rem .45rem; border-radius: 20px; margin-left: .4rem; }
    .badge-done { background: #052e16; color: var(--success); }
    .badge-todo { background: #1c1917; color: var(--warn); }

    /* ── FILTER BAR ── */
    .filter-bar { display: flex; gap: .5rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
    .filter-bar select { background: var(--input-bg); border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: .4rem .6rem; font-size: .8rem; cursor: pointer; }
    .filter-bar span { font-size: .78rem; color: var(--muted); margin-left: auto; }

    /* ── PAGINATION ── */
    .pagination { display: flex; gap: .4rem; justify-content: center; margin-top: 1rem; }
    .page-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: .3rem .65rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:hover:not(.active) { border-color: var(--primary); }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 2.5rem; color: var(--muted); font-size: .88rem; }
    .empty span { font-size: 2rem; display: block; margin-bottom: .5rem; }

    /* ── SECTIONS ── */
    #auth-section { max-width: 420px; margin: 3rem auto 0; }
    #app-section  { display: none; }
    .row { display: flex; gap: .6rem; }
    .row .form-group { flex: 1; }
    .row .btn-primary { align-self: flex-end; white-space: nowrap; height: 38px; }
  </style>
</head>
<body>
<div class="app">

  <!-- NAV -->
  <nav>
    <h1>⚡ Task Manager</h1>
    <div style="display:flex;align-items:center;gap:.8rem">
      <span id="nav-user"></span>
      <button id="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- AUTH SECTION -->
  <div id="auth-section">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login" class="card">
      <h2>Sign in to your account</h2>
      <div id="login-alert" class="alert"></div>
      <div class="form-group"><label>Username</label><input id="l-username" placeholder="Enter username" /></div>
      <div class="form-group"><label>Password</label><input id="l-password" type="password" placeholder="Enter password" /></div>
      <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" class="card" style="display:none">
      <h2>Create an account</h2>
      <div id="reg-alert" class="alert"></div>
      <div class="form-group"><label>Username</label><input id="r-username" placeholder="Choose username" /></div>
      <div class="form-group"><label>Email</label><input id="r-email" type="email" placeholder="your@email.com" /></div>
      <div class="form-group"><label>Password</label><input id="r-password" type="password" placeholder="Min 6 characters" /></div>
      <button class="btn btn-primary" style="width:100%" onclick="register()">Create Account</button>
    </div>
  </div>

  <!-- APP SECTION -->
  <div id="app-section">

    <!-- CREATE TASK -->
    <div class="card">
      <h2>New Task</h2>
      <div id="task-alert" class="alert"></div>
      <div class="row">
        <div class="form-group"><label>Title</label><input id="t-title" placeholder="Task title..." /></div>
        <button class="btn btn-primary" onclick="createTask()">+ Add</button>
      </div>
      <div class="form-group" style="margin-bottom:0"><label>Description (optional)</label><textarea id="t-desc" placeholder="Task details..."></textarea></div>
    </div>

    <!-- TASK LIST -->
    <div class="card">
      <h2>My Tasks</h2>
      <div class="filter-bar">
        <select id="filter-status" onchange="filterChanged()">
          <option value="">All tasks</option>
          <option value="false">Pending</option>
          <option value="true">Completed</option>
        </select>
        <span id="task-count"></span>
      </div>
      <div id="task-list"></div>
      <div id="pagination" class="pagination"></div>
    </div>

  </div>
</div>

<script>
  const API = window.location.origin;
  let token = localStorage.getItem("tm_token") || null;
  let currentUser = localStorage.getItem("tm_user") || null;
  let currentPage = 1;
  const PAGE_SIZE = 8;

  // ── INIT ────────────────────────────────────────────────────────────────────
  function init() {
    if (token) showApp();
    else showAuth();
  }

  function showApp() {
    document.getElementById("auth-section").style.display = "none";
    document.getElementById("app-section").style.display = "block";
    document.getElementById("nav-user").textContent = "👤 " + (currentUser || "");
    document.getElementById("btn-logout").style.display = "inline-block";
    loadTasks();
  }

  function showAuth() {
    document.getElementById("auth-section").style.display = "block";
    document.getElementById("app-section").style.display = "none";
    document.getElementById("btn-logout").style.display = "none";
    document.getElementById("nav-user").textContent = "";
  }

  function logout() {
    token = null; currentUser = null;
    localStorage.removeItem("tm_token");
    localStorage.removeItem("tm_user");
    showAuth();
  }

  // ── TABS ────────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", (i === 0) === (tab === "login")));
    document.getElementById("tab-login").style.display    = tab === "login"    ? "block" : "none";
    document.getElementById("tab-register").style.display = tab === "register" ? "block" : "none";
  }

  // ── ALERTS ──────────────────────────────────────────────────────────────────
  function showAlert(id, msg, type = "error") {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert show alert-${type}`;
    setTimeout(() => el.classList.remove("show"), 4000);
  }

  // ── AUTH ────────────────────────────────────────────────────────────────────
  async function register() {
    const username = document.getElementById("r-username").value.trim();
    const email    = document.getElementById("r-email").value.trim();
    const password = document.getElementById("r-password").value;
    if (!username || !email || !password) return showAlert("reg-alert", "All fields are required.");
    const res = await api("POST", "/register", { username, email, password });
    if (res.ok) {
      showAlert("reg-alert", "Account created! Please login.", "success");
      setTimeout(() => switchTab("login"), 1200);
    } else {
      showAlert("reg-alert", res.data?.detail || "Registration failed.");
    }
  }

  async function login() {
    const username = document.getElementById("l-username").value.trim();
    const password = document.getElementById("l-password").value;
    if (!username || !password) return showAlert("login-alert", "Both fields are required.");
    const res = await api("POST", "/login", { username, password });
    if (res.ok) {
      token = res.data.access_token;
      currentUser = username;
      localStorage.setItem("tm_token", token);
      localStorage.setItem("tm_user", username);
      showApp();
    } else {
      showAlert("login-alert", res.data?.detail || "Login failed.");
    }
  }

  // ── TASKS ───────────────────────────────────────────────────────────────────
  async function loadTasks(page = currentPage) {
    currentPage = page;
    const filter = document.getElementById("filter-status").value;
    let url = `/tasks?page=${page}&page_size=${PAGE_SIZE}`;
    if (filter !== "") url += `&completed=${filter}`;
    const res = await api("GET", url);
    if (res.ok) renderTasks(res.data);
    else if (res.status === 401) logout();
  }

  function filterChanged() { currentPage = 1; loadTasks(1); }

  function renderTasks(data) {
    const list = document.getElementById("task-list");
    const pag  = document.getElementById("pagination");
    document.getElementById("task-count").textContent = `${data.total} task${data.total !== 1 ? "s" : ""}`;

    if (!data.tasks.length) {
      list.innerHTML = '<div class="empty"><span>📋</span>No tasks yet. Add one above!</div>';
      pag.innerHTML = "";
      return;
    }

    list.innerHTML = data.tasks.map(t => `
      <div class="task-item ${t.completed ? "done" : ""}" id="task-${t.id}">
        <div class="task-content">
          <div class="task-title">${escHtml(t.title)}<span class="task-badge ${t.completed ? "badge-done" : "badge-todo"}">${t.completed ? "✓ Done" : "⏳ Pending"}</span></div>
          ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ""}
          <div class="task-meta">Created ${formatDate(t.created_at)}</div>
        </div>
        <div class="task-actions">
          ${!t.completed ? `<button class="btn btn-success" onclick="markDone(${t.id})">✓ Complete</button>` : ""}
          <button class="btn btn-danger" onclick="deleteTask(${t.id})">✕</button>
        </div>
      </div>`).join("");

    // Pagination
    const totalPages = Math.ceil(data.total / PAGE_SIZE);
    pag.innerHTML = "";
    for (let i = 1; i <= totalPages; i++) {
      const b = document.createElement("button");
      b.className = "page-btn" + (i === currentPage ? " active" : "");
      b.textContent = i;
      b.onclick = () => loadTasks(i);
      pag.appendChild(b);
    }
  }

  async function createTask() {
    const title = document.getElementById("t-title").value.trim();
    const description = document.getElementById("t-desc").value.trim();
    if (!title) return showAlert("task-alert", "Title is required.");
    const res = await api("POST", "/tasks", { title, description: description || null });
    if (res.ok) {
      document.getElementById("t-title").value = "";
      document.getElementById("t-desc").value  = "";
      showAlert("task-alert", "Task created!", "success");
      loadTasks(1);
    } else {
      showAlert("task-alert", res.data?.detail || "Failed to create task.");
    }
  }

  async function markDone(id) {
    const res = await api("PUT", `/tasks/${id}`, { completed: true });
    if (res.ok) loadTasks();
  }

  async function deleteTask(id) {
    if (!confirm("Delete this task?")) return;
    const res = await api("DELETE", `/tasks/${id}`);
    if (res.ok) loadTasks();
  }

  // ── API HELPER ───────────────────────────────────────────────────────────────
  async function api(method, path, body = null) {
    const opts = {
      method,
      headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) }
    };
    if (body) opts.body = JSON.stringify(body);
    try {
      const r = await fetch(API + path, opts);
      const data = r.status !== 204 ? await r.json().catch(() => ({})) : {};
      return { ok: r.ok, status: r.status, data };
    } catch (e) {
      return { ok: false, status: 0, data: { detail: "Network error. Is the server running?" } };
    }
  }

  // ── UTILS ────────────────────────────────────────────────────────────────────
  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function formatDate(d) { return d ? new Date(d).toLocaleString("en-IN", { dateStyle:"medium", timeStyle:"short" }) : ""; }

  // Enter key support
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const id = document.activeElement?.id;
    if (["l-username","l-password"].includes(id)) login();
    if (["r-username","r-email","r-password"].includes(id)) register();
    if (["t-title","t-desc"].includes(id)) createTask();
  });

  init();
</script>
</body>
</html>
